<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Status Checker</title>
    <link rel="stylesheet" href="Internet-status-checker.css">
</head>
<body>
    <div class="container">
        <h1>Internet Connection Status Detector</h1>
        <div class="status">
          <p><strong>Connection Status:</strong> <span id="connection-status">Checking...</span></p>
          <p><strong>IP Address:</strong> <span id="ip_address">-</span></p>
          <p><strong>Network Strength:</strong> <span id="network_strength">-</span></p>
        </div>

    </div>


    <script src="Internet-status-checker.js"></script>
</body>
</html>
